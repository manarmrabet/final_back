# Profil DEV ? local, sans Redis
# Actif quand : spring.profiles.active=dev
# ?????????????????????????????????????????????????????????????????????????????

# Désactive complètement l'auto-configuration Redis
# Spring ne cherche plus à se connecter ? zéro warning, zéro erreur
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# GhostAttemptStore détecte automatiquement que RedisTemplate est null
# et utilise le fallback ConcurrentHashMap en mémoire (déjà codé)
